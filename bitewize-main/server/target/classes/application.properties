server.port=8080

# Datasource para PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/BiteWize
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Ajuste do schema: use 'update' em desenvolvimento ou configure migrations (recommended)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Inicialização via SQL (opcional) - coloque seus scripts em src/main/resources/db/
# spring.sql.init.mode=always
# spring.sql.init.schema-locations=classpath:/db/schema.sql
# spring.sql.init.data-locations=classpath:/db/data.sql

# Removendo configurações H2 (não usadas com PostgreSQL)
# spring.datasource.generate-unique-name=false
